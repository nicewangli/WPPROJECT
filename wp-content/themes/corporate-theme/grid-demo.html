<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 网格测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <!-- 实验 1：12 列等宽 -->
        <h3>实验 1：一行 12 等分</h3>
        <div class="row mb-4">
            <div class="col bg-primary text-white p-3 border">1</div>
            <div class="col bg-secondary text-white p-3 border">1</div>
            <div class="col bg-primary text-white p-3 border">1</div>
            <div class="col bg-secondary text-white p-3 border">1</div>
            <div class="col bg-primary text-white p-3 border">1</div>
            <div class="col bg-secondary text-white p-3 border">1</div>
            <div class="col bg-primary text-white p-3 border">1</div>
            <div class="col bg-secondary text-white p-3 border">1</div>
            <div class="col bg-primary text-white p-3 border">1</div>
            <div class="col bg-secondary text-white p-3 border">1</div>
            <div class="col bg-primary text-white p-3 border">1</div>
            <div class="col bg-secondary text-white p-3 border">1</div>
        </div>

        <!-- 实验 2：3 等分 -->
        <h3>实验 2：col-md-4（平板以上 3 列）</h3>
        <div class="row mb-4">
            <div class="col-md-4 bg-primary text-white p-3 border">col-md-4</div>
            <div class="col-md-4 bg-secondary text-white p-3 border">col-md-4</div>
            <div class="col-md-4 bg-primary text-white p-3 border">col-md-4</div>
        </div>

        <!-- 实验 3：g-4 间距 -->
        <h3>实验 3：有间距 vs 无间距</h3>
        <div class="row mb-4">
            <div class="col-md-4"><div class="bg-primary text-white p-3">没 g-4，卡片贴在一起</div></div>
            <div class="col-md-4"><div class="bg-primary text-white p-3">没 g-4，卡片贴在一起</div></div>
            <div class="col-md-4"><div class="bg-primary text-white p-3">没 g-4，卡片贴在一起</div></div>
        </div>
        <div class="row g-4 mb-4">
            <div class="col-md-4"><div class="bg-success text-white p-3">有 g-4，有空隙</div></div>
            <div class="col-md-4"><div class="bg-success text-white p-3">有 g-4，有空隙</div></div>
            <div class="col-md-4"><div class="bg-success text-white p-3">有 g-4，有空隙</div></div>
        </div>

        <!-- 实验 4：col-lg-6 mx-auto 居中 -->
        <h3>实验 4：col-lg-6 mx-auto（居中 + 半宽）</h3>
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <div class="bg-warning p-4 text-center">我在大屏上只占一半宽，并且居中</div>
            </div>
        </div>
    </div>
</body>
</html>
